footnotes:
  policy: markers
  marker: digits      # 'Tathāgata9' markers; '9. ...' page-bottom notes

toc:
  source: printed     # the ONLY witness: no bookmarks, no links
  printed_pages: [6, 7]
  handling: rebuild
  strip_page_numbers: true
  nav_depth: 2

glyphs:
  pua_map: {}
  fail_on_unmapped_pua: true
  gt_strip_phrases: []
  # The Hamza Yusuf essay section (pp.~138-168) embeds font subsets whose
  # ToUnicode CMap is shifted by -0x1D ('WKH'='the', '\x03'=space,
  # '\x14\x14\x1b'='118') — BOTH extraction engines agree on the wrong text
  # because the source map itself lies. Deterministic repair verified against
  # the essay's known title 'Buddha in the Qur'an?' and its running heads.
  shifted_cmap_repair: true
  shifted_cmap_highmap:
    "\u0197": "\u0101"   # Ɨ -> ā
    "\u01AF": "\u012B"   # Ư -> ī  (as embedded)
    "\u01B0": "\u016B"   # ư -> ū
    "\u014C": "\u016A"   # ǌ variant
    "\u01CC": "\u016B"   # ǌ -> ū
    "\u00B5": "\u02BF"   # µ -> ʿ (ayn)
    "\u00B6": "\u02BE"   # ¶ -> ʾ (hamza)
    "\u2026": "\u2026"
    "\x0e": " (may the peace and blessings of God be upon him)"  # honorific dingbat after 'Prophet Muhammad'; context-verified

fonts:
  embed: []
  subset: true

languages: {cjk_han_only: zh, overrides: []}

split: {at_roles: [h1], warn_over_files: 90}

images:
  raster_dpi: 300
  max_pixels: 1600
  alt: {}
  decorative: []
  figure_pages: []

output: {slug: islam-and-buddhism, include_ncx: true}
