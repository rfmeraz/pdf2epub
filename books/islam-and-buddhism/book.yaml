# The pure printed-TOC book: zero bookmarks, zero link annotations; unusable
# InDesign /PageLabels ('Sec1:') overridden by printed folios.

source:
  folder: "package"
  pdf: "Islam and Buddhism.pdf"
  sha256: "e2a52793b24a3fc8a17c440de72135d0e4fc269bdb4b151535168fca94fafbbd"

metadata:                      # from copyright page (p.6 text, read at planning)
