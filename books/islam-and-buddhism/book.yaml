    - {name: "Mohammad Hashim Kamali", role: aui}
  publisher: "Fons Vitae"
  language: en
  additional_languages: []
  isbn_epub:                   # none printed; urn:uuid ships — FLAGGED
  isbn_print: "978-1-891785-62-7"
  date: "2010"
  cover: assets/cover.jpg
  cover_render: {page: 1, box: trim, dpi: 300}   # p.1 = 1799x2706 cover JPEG

pages:
  cover: [1]
  front: {first: 2, last: 24}   # roman folios i-xxiv
  body:  {first: 25, last: 170}
  exclude: [170]                # image-only closing page (back art)
  label_source: printed-folios  # /PageLabels are broken 'SecN:' section labels
  label_overrides: {}
  role_overrides:
    - {page: 2, role: half-title}
    - {page: 4, role: title-page}
    - {page: 5, role: p}        # copyright (printed iv; was mislabeled
                                # title-page, and the old page-6 'copyright'
                                # override sat on the CONTENTS page, wiping
                                # 36 toc-entry roles — proofread finding)

