footnotes:
  policy: markers
  marker: digits      # 'Tathāgata9' markers; '9. ...' page-bottom notes

toc:
  source: printed     # the ONLY witness: no bookmarks, no links
  printed_pages: [6, 7]
  handling: rebuild
  strip_page_numbers: true
  nav_depth: 2

glyphs:
  pua_map: {}
  fail_on_unmapped_pua: true
  gt_strip_phrases: []
  # The Hamza Yusuf essay section (pp.~138-168) embeds font subsets whose
  # ToUnicode CMap is shifted by -0x1D ('WKH'='the', '\x03'=space,
  # '\x14\x14\x1b'='118') — BOTH extraction engines agree on the wrong text
  # because the source map itself lies. Deterministic repair verified against
  # the essay's known title 'Buddha in the Qur'an?' and its running heads.
  shifted_cmap_repair: true
  shifted_cmap_highmap:
    "\u0197": "\u0101"   # Ɨ -> ā
    "\u01AF": "\u012B"   # Ư -> ī  (as embedded)
    "\u01B0": "\u016B"   # ư -> ū
    "\u014C": "\u016A"   # ǌ variant
    "\u01CC": "\u016B"   # ǌ -> ū
    # µ/¶ are the LEFT/RIGHT SINGLE QUOTE glyphs of the broken subset —
    # used both as quotation marks ("God asks you, 'Did you create...'",
    # p.160 render) AND as ayn/hamza in transliterations ('Abd al-Karim,
    # p.140 render), exactly as the book's healthy pages extract them
    # (U+2018/U+2019); the earlier ʿ/ʾ reading shipped modifier letters as
    # quote punctuation. All entries render-verified 2026-07-09.
    "\u00B5": "\u2018"   # µ -> ' (left single quote / ayn glyph)
    "\u00B6": "\u2019"   # ¶ -> ' (right single quote / hamza glyph)
    "\u00B3": "\u201C"   # ³ -> " (p.138 'I have left for you two things')
    "\u00B4": "\u201D"   # ´ -> " (p.138 'you will not go astray')
    "\u00B2": "\u2014"   # ² -> em dash (p.143 'submission to God—has been')
    "\u00AB": "\u2026"   # « -> ellipsis (p.151 'among the Muslims ... named')
    "\u0196": "\u0100"   # Ɩ -> Ā (p.159 'Ibn ʿĀbidīn')
    "\u2026": "\u2026"
    "\x0e": " (may the peace and blessings of God be upon him)"  # honorific dingbat after 'Prophet Muhammad'; context-verified
  fffd_repairs:
    # long runs of U+FFFD (extractor's unmapped-glyph placeholder) between
    # a note number and its text / at a sentence seam; renders show NO
    # visible content at those spots (invisible zero-width prepress glyphs)
    - {pages: [36, 37, 38, 41, 42, 44, 47], replace: "", note: "notes 10/12/13/18/20/22/25: FFFD runs after the note number; renders pp.36-47 show only the space before the note text"}
    - {pages: [98], replace: "", note: "FFFD run after 'utterly \u2018empty\u2019.' mid-paragraph; p.98 render shows the sentence flowing straight on"}

blocks:
  # JP-P9: Buddhist scripture VERSE (Dhammapada, Flower Ornament,
  # Milarepa's songs, Qur'anic sura 107) set line-for-line at the same
  # 18pt inset as the quotes but RAGGED — single-level convention
  # (turns omitted; the ragged-right requirement discriminates).
  # Render-verified pp.80 (two Flower Ornament stanzas incl. an
  # ellipsis line) and 113 (sura 107 + two Milarepa stanzas); the
  # build's verse-suspect witness found exactly these eight pages.
  verse:
    - {pages: [62, 63, 64, 73, 75, 80, 81, 82, 86, 87, 100, 103, 112,
               113, 126, 132, 133, 134], base: [18],
       note: "single-level scripture verse at the quote inset, ragged; renders pp.80/113 + Phase F blind-reader sites verified by line dumps: p63 Avatamsaka, p86 three Flower Ornament groups, p100 Jami couplet, p103 Milarepa, p112 sura 107 opening, pp.132-133 Milarepa (2026-07-10)"}
  # JP-P9: the book quotes at a justified 18pt inset off BOTH body edges
  # (verified on renders pp.51/151: Dalai Lama passages, al-Juzjani account;
  # detector evidence: 86 justified 18/18 runs on 61 pages across 11-160).
  # The body's own 18pt first-line indent shares the left offset but never
  # earns the justified-right witness. Ragged single-level VERSE candidates
  # (right offsets 86-158pt) sit far outside tol and stay for the Phase F
  # verse re-judge.
  quotes:
    - {pages: ["11-160"], left_inset: 18, right_inset: 18,
       note: "18/18pt justified inset block quotes throughout the body; render-verified pp.51/151"}
  # JP-P9: bulleted scripture/epithet listings at the same 18pt inset as
  # the quotes (flat — turnovers share the bullet stop); the bullet marker
  # is the stronger signal, so lists classify first and these pages'
  # justified runs stay out of the blockquote. The p.39/57 epithet columns
  # are short ragged lines the verse-suspect witness would otherwise flag.
  lists:
    - {pages: ["38-39", 57], marker: bullet, hang: 0,
       note: "bulleted Quranic citations (p.38) and Buddha-epithet listings (pp.39/57); render-verified"}

