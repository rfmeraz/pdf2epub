# Gate-24 regression assertions — pray-without-ceasing (see qa/assertions.py).
# A TEST fixture, not a build input. Operands copied from SHIPPED normalized text.
# `page` is the PRINTED folio, not the PDF page.
#
# Every cell pins a print-verified defect this conversion found and fixed. The
# index cells do double duty: pages 219-227 are engine-disputed (poppler reads
# the columns, MuPDF y-sorts them), so gate 2's coverage witness is BLIND there
# and these are the only machine-checkable defense those pages have (gate 25b).

# --- LIGATURE-PAD spaces (extract.mupdf.repair_span_text case 3a).
# Minion's Th/fi/ft/ff/ffi ligatures advance less than their own ink, and the
# producer pads the difference with a space drawn back UNDER the ligature. The
# text layer read 'Th e Way', 'oft en', 'fi rst', 'affi  rmation' on nearly
# every page — 2572 sites. present-of-correct, not absent-of-broken: it also
# catches a dropped glyph.
- {page: "i", type: present, text: "The Library of Perennial Philosophy is dedicated to the exposition",
   note: "'Th e Library' — the Th ligature pad; p4 render"}
- {page: "i", type: present, text: "finds its expression in the revealed Scriptures",
   note: "'fi nds' — the fi ligature pad; p4 render"}
- {page: "3", type: present, text: "The following excerpts are taken from Song VIII",
   note: "'Th e following' — Th pad in the Bhagavad Gītā headnote; p24 render"}
- {page: "136", type: present, text: "The form of dhikr in this case is like the inverted letter",
   note: "'Th e form' — Th pad. Folio 136: the paragraph OPENS on p157 and slice_pages
          attributes a block to the page it starts on; p158 render"}
- {page: "218", type: present, text: "obtained a Ph.D. in French literature in 1985",
   note: "Ph.D. as printed (qa.lost_space_allow); p239 render"}

# --- LIGATURE-PAD case 3b: a PRESENTATION-FORM ligature (one glyph, one char)
# has no continuation glyph for the pad to hide behind, so the pad overlaps the
# ligature's OWN ink. Six index words shipped broken ('Cruciﬁ ed', 'Abulafi a',
# 'Sufi sm') past every gate — only the gate-18 visual sheet caught them.
- {page: "220", type: present, text: "Crucified, 76, 194",
   note: "index: 'Cruciﬁ ed' — pad inside the U+FB01 ligature's ink; p241 render"}
- {page: "220", type: present, text: "Crucifix, 75, 190",
   note: "index: 'Cruciﬁ x'; p241 render"}
- {page: "219", type: present, text: "Abulafia, Abraham 28-29, 31, 33",
   note: "index: 'Abulafi a'; p240 render"}
- {page: "225", type: present, text: "Sacrifices",
   note: "index: 'Sacrifi ces'; p246 render"}

# --- INLINE RTL (extract.mupdf.reorder_bidi_lines). The producer draws the
# punctuation that CLOSES a Hebrew run as a jump back out to its right, so the
# stream emitted it BEFORE the Hebrew: 'Yod-He-Vav-He ( ,)יהוה'.
- {page: "211", type: present, text: "Yod-He-Vav-He (יהוה), which form the supreme Divine Name",
   note: "Glossary Tetragrammaton entry — logical order restored; p232 render"}
- {page: "89", type: present, text: "the “two-letter name,” YH (יה) which is pronounced",
   note: "inline Hebrew, closing paren restored; p110 render"}
- {page: "91", type: present, text: "by the vav (ו). According to the",
   note: "inline Hebrew, closing paren + period restored; p112 render"}

