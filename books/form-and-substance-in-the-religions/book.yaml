    - {page: 265, line: 36, action: join,  note: "turnover -> World Wisdom, 2002"}

footnotes:                    # JP-P4 — verified on p10/p20 renders (digit markers, hanging indent)
  policy: markers   # census {'digit': 334, '*-inline': 249 (the '*' are section breaks, not notes)}
  marker: digits

toc:                          # JP-P3 — printed TOC (p6) chosen
  source: printed   # outline(23) has 4 junk front-matter entries; printed is the numbered 1-18 contents
  printed_pages: [6]
  handling: rebuild
  strip_page_numbers: true
  nav_depth: 1                # printed TOC is flat (one level: Preface + 18 chapters)

glyphs:                       # JP-P6 — PUA census empty; transliteration diacritics are real Latin Unicode
  pua_map: {}
  fail_on_unmapped_pua: true

fonts:                        # JP-P7 — OFL system fonts only; no CJK/RTL live text
  embed: []
  subset: true

languages: {cjk_han_only: zh, overrides: []}   # JP-P8 — 0 CJK, 0 RTL

split: {at_roles: [h1], warn_over_files: 90}

images:                       # JP-P4b — no figures/tables/plates in this text
  raster_dpi: 300
  max_pixels: 1600
  figure_pages: []
  figure_regions: []

adjudications:
