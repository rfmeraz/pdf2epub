footnotes:
  policy: markers
  marker: asterisk     # body notes are asterisks; the introduction's six
                       # digit-note pages stay inline (small type) — FLAGGED

toc:
  source: printed
  printed_pages: [8, 9]
  handling: rebuild
  strip_page_numbers: true
  nav_depth: 1         # chapters are TOC-only groupings with no physical
                       # headings; nav mirrors parts + passage structure

glyphs:
  pua_map: {}
  fail_on_unmapped_pua: true
  gt_strip_phrases: []

fonts:
  embed: []
  subset: true

languages: {cjk_han_only: zh, overrides: []}

split: {at_roles: [h1], warn_over_files: 90}

images:
  raster_dpi: 300
  max_pixels: 1600
  alt: {}
  decorative: []
  figure_pages: []

output: {slug: me-and-rumi, include_ncx: true}
