blocks:
  # Verse judgment (2026-07-10). Body verse is two-level: base at the
  # paragraph indent (offset 9-11 pt recto/verso), couplet turn lines at
  # 36-38 — render-verified pp.35 (quatrain), 46 (Kaaba couplet, the
  # print-verified _CONT_DASHES fusion), 68, 70, 165. Single-level runs at
  # the base offset are DIALOGUE set one speech per line (p.68 render:
  # "Sir, are you a Jew?" exchange) — prose, hence turns required.
  # Notes verse (pp.337-373) sits deeper: base 35-38, ghazal turns ~48.7
  # (p.367 render) and quote turns ~71-74 (pp.341/345/370 renders); note
  # first lines share the verse base offset and are shed by the
  # strict-alternation split (p.370 "Water seeks a thirsty man...").
  verse:
    - {pages: ["28-336"], base: [10], turns: [37], tol: 2.5,
       note: "body couplets/quatrains — renders pp.35/46/68/70/165 (2026-07-10)"}
    - {pages: ["337-373"], base: [37.5], turns: [50, 73.5], tol: 3.5,
       note: "notes-region verse — renders pp.341/367/370 + p.356 ghazal at turn offset 52 (proofread round 1, 2026-07-10)"}
  # List judgment (2026-07-10, Phase L). The notes apparatus is a decimal
  # hanging-indent list: passage-number entries at the body left
  # ("43.Necessary in existence…"), turnovers 27pt deeper, sub-lemma
  # paragraphs at +36 with their own 9pt first-line indent (render-verified
  # pp.340/370). The shipped artifact split nearly every note's first line
  # from its body and fused full-width note ends into the next entry
  # (proofread round-1 packets 037-040) — entry-break + hang-join heals
  # both classes. Numbering restarts at each chapter's notes section
  # (list-marker-gap ADVISORY expected). The ghazals quoted inside notes
  # stay verse and nest inside their items. Works Cited (pp.374+) has NO
  # markers — out of scope for the marker detector (handoff).
  lists:
    - {pages: ["336-374"], marker: decimal, hang: 27,
       note: "notes-apparatus passage entries with 27pt hanging turnovers; render-verified pp.340/370; heals proofread round-1 packets 037-040; numbered notes start mid-p.336 after the bibliography and end p.374 (index starts p.375)"}

