# Gate-24 regression assertions — keys-to-the-beyond (see qa/assertions.py).
# A TEST fixture, not a build input. Operands copied from SHIPPED normalized text.
#
# Every cell pins a print-verified defect this conversion found and fixed. Most
# of them survived all 26 gates and were caught only by a blind reader or a
# render — which is exactly why they need a machine-checkable tripwire.
#
# NB `absent` is unavailable for the two biggest ones: a returning chapter-
# opening footnote leaks its text back into the BODY (a structure loss, not a
# residue), and gate 3's note/ref counts + these `present` cells are what hold
# them. The folio leak IS expressible, so it gets an `absent`.

# --- the TrimBox/CropBox mismatch: all 12 chapter-opening pages lost their
# footnotes to an unstripped drop folio (extract.mupdf.trim_in_text_space).
# The note text belongs in the NOTES file, so the body page must not carry it;
# the bare folio must not either.
- {page: "1",   type: absent, text: "Toshihiko Izutsu, Sufism and Taoism: A Comparative Study",
   note: "ch-opening footnote 1 must stay in the apparatus, not leak into the Introduction's body"}
- {page: "27",  type: absent, text: "Schuon, The Eye of the Heart (Bloomington, IN: World Wisdom, 1997), 70.",
   note: "ch.1 opening footnote must stay in the apparatus (drop-folio blocked the note-region walk)"}
- {page: "153", type: absent, text: "Schuon, Understanding Islam (Bloomington, IN: World Wisdom, 2011), 13.",
