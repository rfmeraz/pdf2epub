# Gate-24 regression assertions — keys-to-the-beyond (see qa/assertions.py).
# A TEST fixture, not a build input. Operands copied from SHIPPED normalized text.
#
# Every cell pins a print-verified defect this conversion found and fixed. Most
# of them survived all 26 gates and were caught only by a blind reader or a
# render — which is exactly why they need a machine-checkable tripwire.
#
# NB `absent` is unavailable for the two biggest ones: a returning chapter-
# opening footnote leaks its text back into the BODY (a structure loss, not a
# residue), and gate 3's note/ref counts + these `present` cells are what hold
# them. The folio leak IS expressible, so it gets an `absent`.

