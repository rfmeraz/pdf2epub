# The Book of Knowledge — ARABIC-GLYPH VARIANT (2026-07-08). Same judgments
# as book.yaml except: honorific PUA glyphs render as Arabic (Unicode
# ligatures/phrases, lang: ar) with an embedded OFL Amiri subset, and the
# output slug differs. Keep the two files in sync for everything else.
# Every decision traces to analysis/structure_report.md or a page render;
# glyph identifications verified on analysis/glyph-grid*.png (350 dpi crops)
# against the book's own legend (Publisher's Note, p.26 render).

source:
  folder: "package"
  pdf: "adult-The_Book_of_Knowledge_cover and TOC links.pdf"
  sha256: "48ea4f71a48e94390a19ffa705f992bb2853bb0c70f3d5e8f63c9df24086704d"

metadata:                     # from title (p.4) + copyright (p.5) page text
  title: "The Book of Knowledge"
  subtitle: "Book 1 of the Revival of the Religious Sciences"
  creators:
    - {name: "Abū Ḥāmid al-Ghazālī", role: aut}
    - {name: "Kenneth Honerkamp", role: trl}
    - {name: "Hamza Yusuf", role: aui}   # foreword
  publisher: "Fons Vitae"
  language: en
  additional_languages: []
  isbn_epub: "978-1-941610-21-3"   # printed on the copyright page (eBook ISBN)
  isbn_print: "978-1-941610-15-2"
  date: "2015"
  cover: assets/cover.jpg
  cover_render: {page: 1, box: trim, dpi: 300}   # p.1 is the cover JPEG

pages:
  cover: [1]
  front: {first: 2, last: 47}    # roman folios; body folio '1' prints on p.48
  body:  {first: 48, last: 338}
  # p.338 is an image-only closing page (no text layer). The columned back
  # matter (Qurʾānic index pp.322-323, general index pp.324-336) flows via
  # flow.columns below — engine-agreement flags those pages (poppler reads
  # columns, MuPDF y-sorts), so gate 2 excludes them; gate 19 validates the
  # Qurʾānic citations instead.
  exclude: [338]
  label_source: pdf-page-labels   # folio-vs-label agreement 100% on 325 pages
  label_overrides: {}
  role_overrides:
    - {page: 2, role: half-title}
    - {page: 3, role: half-title}
    - {page: 4, role: title-page}
    - {page: 5, role: p}          # copyright page: plain text

furniture:
  top_band: 28.9
  repeat_min_pages: 3
  extra: ["Contents"]             # 'Contentsix' head on TOC pages 7-8 (2 repeats only)
  keep: []

styles:
  body_pstyle: "Minion@11"
  pstyle_map:
    "Minion@11":                  {role: p}      # dominant cluster
    "Minion@8.5":                 {role: footnote}
    "Minion@10":                  {role: p}      # block quotes/front lists (sized via CSS)
    "Minion@9":                   {role: footnote}
    "Minion-Italic@11":           {role: p}
    "Minion-Italic@10":           {role: p}
    "Minion@11/center":           {role: p}     # attributions/dividers (below nav_depth)
    "Minion-Italic@8.5":          {role: footnote}
    "Minion@9/center":            {role: footnote}
    "Minion@12/center":           {role: h2}
    "Minion@8.5/center":          {role: footnote}
    "BriosoPro-Regular@12/center": {role: h2}    # chapter subtitle lines
    "BriosoPro-Regular@12":       {role: h2}    # long subtitle lines (wide-centered)
    "Minion-SemiBold@13/center":  {role: h2}
    "Minion@10/center":           {role: p}
    "Minion@10.5":                {role: p}
    "Minion-Italic@9":            {role: footnote}
    "Minion-Italic@11/center":    {role: p}
    "Minion-Italic@8.5/center":   {role: p}
    "Minion@12":                  {role: h2}   # census 2026-07-10: every Minion@12 line is a heading (two-line chapter subtitles that lose /center); mirrors book.yaml
    "Minion-SemiBold@15/center":  {role: h1}     # section heads (Foreword etc.)
    "Minion-Italic@12/center":    {role: h2}
    "Minion@21":                  {role: title-page}
    "Minion@22":                  {role: title-page}
    "Minion-Bold@13/center":      {role: h2}
    "Minion-SemiBold@14/center":  {role: h2}
    "BriosoPro-Regular@18/center": {role: h1}    # big chapter numerals
    "Minion-Italic@24":           {role: title-page}
    "Minion-Italic@33":           {role: title-page}
    "Minion-SemiBold@11":         {role: p}
    "Minion-SemiBold@12/center":  {role: h3}
    "Minion@13/center":           {role: h3}
    "Minion@28":                  {role: title-page}
    "Minion@36":                  {role: title-page}
    "Minion@48":                  {role: title-page}
    "Minion@31.5":                {role: p}      # drop caps (reattached by flow)
    "Minion@52.5":                {role: p}
    "Minion@32":                  {role: p}
    "BriosoPro-Regular@11":       {role: p}
    "BriosoPro-Regular@11/center": {role: p}
    "Honorifics@11":              {role: p}
    "Honorifics@11/center":       {role: p}
    "Honorifics@14":              {role: p}
    "Honorifics@17":              {role: p}
    "Honorifics@36":              {role: p}
    "Honorifics@36/center":       {role: p}
    "Honorifics@18":              {role: p}
    "Honorifics@24":              {role: p}
    "Honorifics@35.5":            {role: p}
    "Helvetica@9":                {role: drop}   # stray production text if any
  charstyles:
    Honorifics: {symbol: true}
  unmapped_role: p
  fail_on_unmapped: true

flow:
  indent_threshold: 13.5
  gap_factor: 1.6
  dehyphenate: lower-only
  restore_spaces: false
  join_center_lines: true
  reattach_dropcaps: true
  # overrides address RAW extract line indexes — identical geometry to
  # book.yaml (same PDF, same extraction; only pua_map/fonts differ), so the
  # main variant's render-verified judgments transfer verbatim
  overrides:
    - {page: 224, line: 17, action: "class:prose", note: "'A poet once said' — prose intro at the verse inset (p.224 render)"}
    - {page: 224, line: 20, action: "class:prose", note: "'While another recounted' — prose intro at the verse inset (p.224 render)"}
    # hanging-indent turnovers the indent rule misreads as new paragraphs
    # (all verified: each continues a hyphenated word from the line above)
    - {page: 43, line: 22, action: join, note: "numbered-list turnover 'dif-/ficult'"}
    - {page: 236, line: 16, action: join, note: "Quran-quote turnover 'destruc-/tion'"}
    - {page: 239, line: 16, action: join, note: "quote turnover 'atten-/tion'"}
    - {page: 276, line: 14, action: join, note: "quote turnover 'sub-/missive'"}
    # Phase F round 3 (2026-07-10): prepress size wobble — a lone Minion@10.5
    # line amid 11pt broke the paragraph mid-sentence (readers: printed
    # 165/166 'three blocks'); geometry pp.212/213
    - {page: 212, line: 31, action: join, note: "10.5pt line mid-paragraph 'intellect has no means of accessing'"}
    - {page: 212, line: 32, action: join, note: "11pt resumes mid-sentence after the 10.5pt line"}
    - {page: 213, line: 19, action: join, note: "11pt resumes mid-sentence after the 10.5pt 'Measure everyone' line"}
    # two-line chapter subtitles: the wide first line loses /center, the
    # pstyle seam split the subtitle mid-phrase (reader-flagged printed 170)
    - {page: 46, line: 2, action: join, note: "subtitle line 2 'book of the Revival…' continues 'the opening'"}
    - {page: 166, line: 11, action: join, note: "subtitle line 3 'the Mutual Consultations…' continues line 2"}
    - {page: 174, line: 28, action: join, note: "subtitle line 2 'Destruction of Morals…' continues line 1"}
    - {page: 217, line: 3, action: join, note: "subtitle line 2 'Hereafter and of the Reprehensible Scholars' continues line 1 (print p.170)"}
    # Phase F round 3 verse extensions — near-full poem lines and hanging
    # turnovers the single-level acceptance sheds (class:verse skips the
    # candidacy tests); prose intro lines share the 18pt inset (class:prose).
    # All render-verified via line dumps 2026-07-10.
    - {page: 57, line: 4, action: "class:prose", note: "'And in verse he [ʿAlī] said' — prose intro at the inset"}
    - {page: 57, line: 8, action: "class:verse", note: "ʿAlī poem line ends 8.3pt short (< SHORT_BY)"}
    - {page: 57, line: 10, action: "class:verse", note: "ʿAlī poem line ends 2pt short"}
    - {page: 214, line: 14, action: "class:verse", note: "al-Shāfiʿī poem: full-measure verse line 'Should God the Gracious…'"}
    - {page: 214, line: 15, action: "class:verse", note: "hanging turnover 'to me' (27pt stop)"}
    - {page: 214, line: 16, action: "class:verse", note: "verse line ends 2.5pt short"}
    - {page: 214, line: 17, action: "class:verse", note: "full-measure verse line"}
    - {page: 214, line: 18, action: "class:verse", note: "hanging turnover 'personally'"}
    - {page: 214, line: 21, action: "class:verse", note: "full-measure closing verse line"}
    - {page: 214, line: 22, action: "class:verse", note: "hanging turnover 'injustice'"}
    - {page: 220, line: 10, action: "class:prose", note: "'In this regard a poet said:' — prose intro at the inset"}
    - {page: 220, line: 11, action: "class:verse", note: "'Astonished I was…' quatrain line ends 2pt short"}
    - {page: 220, line: 12, action: "class:verse", note: "hanging turnover 'wardness'"}
    - {page: 220, line: 13, action: "class:verse", note: "quatrain line ends 2pt short"}
    - {page: 220, line: 14, action: "class:verse", note: "quatrain line ends 2.1pt short"}
    - {page: 220, line: 15, action: "class:verse", note: "full-measure quatrain line"}
    - {page: 220, line: 16, action: "class:verse", note: "hanging turnover 'astounding'"}
    - {page: 232, line: 11, action: "class:verse", note: "'O you who admonish…' verse line ends 2pt short"}
    - {page: 232, line: 12, action: "class:verse", note: "full-measure verse line"}
    - {page: 232, line: 13, action: "class:verse", note: "hanging turnover 'with62'"}
    - {page: 232, line: 14, action: "class:verse", note: "verse line ends 6.6pt short"}
    - {page: 232, line: 15, action: "class:verse", note: "verse line ends 2.1pt short"}
    - {page: 232, line: 18, action: "class:prose", note: "'Another [poet]64 once said,' — prose intro between the poems"}
    - {page: 277, line: 3, action: "class:prose", note: "'For this reason the poet said,' — prose intro at the inset"}
    - {page: 277, line: 5, action: "class:verse", note: "couplet line 2 ends 1.9pt short"}
    - {page: 279, line: 19, action: "class:prose", note: "'The poet205 was correct when he stated,' — prose intro at the inset"}
    - {page: 279, line: 20, action: "class:verse", note: "six-line poem line 1 ends 3.7pt short"}
    - {page: 279, line: 21, action: "class:verse", note: "six-line poem line 2 ends 8.8pt short"}
  # columned back matter (verified on p.322/324/330 renders + run geometry:
  # gutters at ~170/270 for the 3-col verse index, ~215 for the 2-col index;
  # entries one per line with hanging-indent turnovers)
  columns:
    - {pages: [322, 323], count: 3, note: "Qurʾānic Verses Cited"}
    - {pages: ["324-336"], count: 2, note: "general index"}

footnotes:
  policy: markers
  marker: digits

toc:
  source: outline            # 79 hierarchical bookmarks; corroborated by 83
  printed_pages: [6, 7, 8]   # links and the printed Contents parse (74 entries)
  handling: rebuild
  strip_page_numbers: true
  nav_depth: 2

glyphs:
  # Honorifics font, PUA codepoints. VARIANT: rendered as Arabic — the
  # Unicode honorific ligatures where one exists (U+FDFA salla..., U+FDFD
  # basmala) and the spelled honorific phrase otherwise, tagged lang: ar and
  # set in embedded Amiri. Glyph identifications carry over verbatim from
  # book.yaml (each verified on a 350dpi crop against the book's own legend).
  pua_map:
    "": {action: char, char: " ﷺ", lang: ar, note: "salla llahu alayhi wa-sallam, compact; verified p.52 crop; x292"}
    "": {action: char, char: " تعالى", lang: ar, note: "ta'ala; verified p.40 crop; x253"}
    "": {action: char, char: " رضي الله عنه", lang: ar, note: "radiya llahu anhu; verified p.7 crop; x125"}
    "": {action: char, char: " رحمه الله", lang: ar, note: "rahimahu llah; verified p.6 crop; x87"}
    "": {action: char, char: " عز وجل", lang: ar, note: "azza wa-jalla; verified p.50 crop; x71"}
    "": {action: char, char: " سبحانه", lang: ar, note: "subhanahu; verified p.45 crop; x32"}
    "": {action: char, char: " رضي الله عنهما", lang: ar, note: "anhuma dual (Ibn Abbas); verified p.50 crop; x29"}
    "": {action: char, char: " عليه السلام", lang: ar, note: "alayhi s-salam; verified p.54 crop; x27"}
    "": {action: drop, note: "geometric star section ornament; verified p.8 crop; x27"}
    "": {action: char, char: " رضي الله عنهم", lang: ar, note: "anhum plural; verified p.86 crop; x26"}
    "": {action: char, char: " عليهم السلام", lang: ar, note: "alayhim; verified p.74 crop; x7"}
    "": {action: char, char: " رحمهم الله", lang: ar, note: "rahimahum; verified p.165 crop; x7"}
    "": {action: char, char: " ﷺ", lang: ar, note: "salla llahu... spelled large; verified p.19 crop; x5"}
    "": {action: char, char: " عليه السلام", lang: ar, note: "alayhi s-salam variant; verified p.57 crop (David); x4"}
    "": {action: char, char: " رحمهما الله", lang: ar, note: "rahimahuma dual (Ibn Hanbal and Sufyan); verified p.7 crop; x4"}
    "": {action: char, char: " سبحانه وتعالى", lang: ar, note: "subhanahu wa-ta'ala; legend row 3 + p.50 crop; x3"}
    "": {action: char, char: " رضي الله عنها", lang: ar, note: "anha (A'isha); verified p.144 crop; x2"}
    "": {action: char, char: " ﷺ", lang: ar, note: "salla... variant; verified p.129 crop; x2"}
    "": {action: char, char: " عز وجل", lang: ar, note: "azza wa-jalla large; verified p.40 crop; x1"}
    "": {action: char, char: " صلى الله عليه وآله وسلم", lang: ar, note: "wa-ala alihi form; verified p.39 crop; x1"}
    "": {action: char, char: " رضي الله عنهم", lang: ar, note: "anhum large; verified p.43 crop; x1"}
    "": {action: char, char: " عليهم السلام", lang: ar, note: "alayhim large; verified p.44 crop; x1"}
    "": {action: char, char: "﷽", lang: ar, note: "full basmala calligraphy line; verified p.38 crop; x2"}
  fail_on_unmapped_pua: true
  gt_strip_phrases: []

# same structural judgments as book.yaml (identical page geometry) — the
# verse-suspect witness flags any drift on rebuild (gate 22)
blocks:
  # JP-P9 + Phase F round 3: single-level VERSE quotations at the 18pt
  # inset, ragged (render-verified: p.214 al-Shafi'i 'Shall I scatter my
  # pearls…', p.224 two couplets with prose intros — class:prose). The
  # p.245 suspect is Malik's quoted EPISTLE (intro + centered italic
  # salutation), adjudicated below. Poems whose lines run near-full or
  # wrap with hanging turnovers (pp.57/214/220/232/277/279) are pinned
  # line-by-line with class:verse overrides above — each turnover ships
  # as its own verse line, exactly as printed.
  verse:
    - {pages: [57, 191, 214, 216, 220, 224, 232, 277, 279], base: [18],
       note: "single-level poet quotations at the quote inset; renders pp.214/224 + Phase F round-3 blind-reader sites verified by line dumps: p57 ʿAlī poem, p191/216/277 couplets, p220 quatrain, p232 admonisher verses, p279 six-line poem (2026-07-10)"}
  # JP-P9: long hadith/athar quotations set at a justified 36pt LEFT inset,
  # right edge at the body margin (render-verified pp.193/220/259-261: the
  # ʿAlī narrations, 'The scholar will be brought forward…'). Drop-cap wrap
  # lines share the same 36pt inset beside wide initials (pp.9/50/163/294)
  # and are vetoed by the detector; the p.220 poet quatrain above the quote
  # is ragged VERSE, classified via the round-3 class:verse overrides.
  quotes:
    - {pages: [56, 193, 220, 221, 227, "259-261"], left_inset: 36,
       note: "36pt left-inset justified quotations; render-verified pp.193/220/259-261; p.221 carries the p.220 quotation's page-turn continuation ('I used to enjoin…', round-2 reader)"}
  # JP-P9: the Author's Introduction enumerates the forty books as four
  # decimal lists ("1.·The Book of Knowledge" … "40.·…", interpunct
  # separator) at one entry stop with 22.5pt hanging turnovers (item 10
  # wraps). Render-verified pp.41-42.
  lists:
    - {pages: ["41-42"], marker: decimal, hang: 22.5,
       note: "the forty books of the Revival, four numbered lists; render-verified pp.41-42"}

fonts:
  embed:         # honorific runs are lang: ar -> Amiri (OFL, system file)
    - {family: "Amiri", file: "/usr/share/fonts/amiri-fonts/Amiri-Regular.ttf",
       style: normal, script: cjk, lang: ar}
  subset: true

languages: {cjk_han_only: zh, overrides: []}

split: {at_roles: [h1], warn_over_files: 90}

images:
  raster_dpi: 300
  max_pixels: 1600
  alt: {}
  decorative: []
  figure_pages: []
  # Publisher's Note glyph legend (p.26, label xxvii): a TRUE 3-column table
  # (Arabic glyph | English meaning | Usage) the line flow cannot represent —
  # ships as a cropped raster; rect from extract line geometry (table lines
  # 8-29, y 319.6-559.5, plus the hairline rules). Alt written from the render.
  figure_regions:
    - page: 26
      rect: [70, 319, 367, 567]
      alt: "Table of the Arabic honorific glyphs used in this book, giving each glyph's English meaning and usage: Mighty and majestic is He (on mention of God); Peace be upon him or them (on mention of one or more prophets); Exalted and Most High (on mention of God); May the peace and blessings of God be upon him (on mention of the Prophet); May God be pleased with him or them (on mention of one or more Companions of the Prophet); May God be pleased with her (on mention of a female companion of the Prophet)."
      note: "glyph legend table; verified on p.26 render"

adjudications:
  - {warning: verse-suspect, pages: [245], note: "render reviewed 2026-07-10: Malik's quoted letter — prose intro 'Malik wrote back in reply:' + centered italic basmala salutation + justified letter body; an epistolary block, not verse"}
  - {warning: top-band-kept, pages: [4], note: "'Al-Ghazali' is the title page's display line inside the top band, correctly kept - p.4 render 2026-07-09"}
  - {warning: rtl-live-text, note: "user-requested Arabic-glyph variant (NOTES 2026-07-09): short inline strong-RTL phrases inside LTR paragraphs, bidi-rendered correctly with no dir attrs; verified in Chrome renders. RTL PARAGRAPHS remain a hard stop"}

output: {slug: book-of-knowledge-arabic, include_ncx: true}
