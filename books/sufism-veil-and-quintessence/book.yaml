    WorldWisdomFont-Bold-SC8: {smallcaps: true}   # small-capital name heads
  unmapped_role: p
  fail_on_unmapped: true

flow:
  indent_threshold: 13.5
  gap_factor: 1.6             # median leading 13.1pt
  dehyphenate: lower-only
  keep_hyphens:              # proofread 2026-07-11: real compounds whose hyphen
                            # fell at a line break; lower-only stripped it. Each
                            # verified hyphenated elsewhere in the book.
    - "religion-quintessence"   # p29; cf. "religion-synthesis" adjacent
    - "prayer-niche"            # note 162; hyphenated at its 1st occurrence
    - "karma-yoga"              # p138; hyphenated at every other occurrence
    - "quasi-supernatural"      # p89; cf. "quasi-natural"
    - "vis-à-vis"               # p.ix; standard hyphenated phrase
    - "non-theological"         # p90; cf. "non-esoteric"/"non-formal"
    - "lightning-like"          # p73; "-like" compound
    - "logician-like"           # note 42; cf. hyphenated "logician-like" in ch.1
  restore_spaces: false      # lost-space hits: 0
  join_center_lines: false   # centered lines are DISTINCT items here (the
                             # 'Books by Frithjof Schuon' list, title-page
                             # credits); joining fused them. Multi-line centered
                             # headings are rejoined via overrides below.
  reattach_dropcaps: true
  overrides:                 # {page, line(RAW extract idx), action, note}
    - {page: 152, line: 1, action: join,
       note: "appendix content title wraps to a 2nd centered line ('Other Previously Unpublished Writings'); rejoin into one h2 (join_center_lines off). Verified p152 render."}
    # Phase F round 3 (2026-07-10): the 'Books by Frithjof Schuon' page
    # (physical 3) — one title per print line; the indent-join fused
    # neighbours whose x0 steps sit under the threshold (reader-flagged,
    # worsened by the round-2 justified-cluster coverage change).
    # 'ed. …' lines are TURNOVERS of the title above (join).
    - {page: 3, line: 2, action: "break", note: "book-list title, one per line (line dump 2026-07-10)"}
    - {page: 3, line: 3, action: "break", note: "book-list title, one per line (line dump 2026-07-10)"}
