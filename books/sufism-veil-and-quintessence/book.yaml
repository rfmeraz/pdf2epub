  printed_pages: [6]
  handling: rebuild
  strip_page_numbers: true
  nav_depth: 1                # printed TOC is flat (one level)
  standalone_lines:           # proofread 2026-07-11: 'Appendix' (p6) carries no
    - "Appendix"              # folio -> was fused onto 'Hypostatic Dimensions of
                              # Unity' as a fake turnover; it's its own entry

