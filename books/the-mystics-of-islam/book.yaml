# pdf2epub book.yaml — The Mystics of Islam (Reynold A. Nicholson).
# Judgments recorded from analysis evidence and page renders, 2026-07-20.

schema_version: 1

source:
  folder: "package"
  pdf: "The Mystics of Islam (2003).pdf"
  sha256: "d9515c3071384355d5bf12814f7ac533f45f58909977ebffbeaddc255f805403"

metadata:                     # JP-P5 — verified on p4/p5 renders
  title: "The Mystics of Islam"
  creators:
    - {name: "Reynold A. Nicholson", role: aut}
  publisher: "World Wisdom, Inc."
  language: en
  additional_languages: []
  isbn_epub:                  # never invented; empty -> identifier/urn:uuid
  isbn_print: "978-0-941532-48-8"
  identifier: 89f5cd9c-63b4-41ed-b38f-821399905792   # persistent EPUB id; keep STABLE across revisions
  released: "2026-07-20"      # dcterms:modified for this EPUB revision
  date: "2002"
  cover: assets/cover.jpg     # produced by cover_render at build time
  cover_render: {page: 1, box: trim, dpi: 300}
  # cover evidence: page 1 is image-dominated (6 image(s), 38 chars)

pages:                        # JP-P2 — confirm against thumbs
  cover: [1]
  front: {first: 2, last: 13}   # roman folios
  body:  {first: 14, last: 144}   # printed folio '1' begins on p14; bio on p144
  exclude: [145]                  # physical back cover: marketing copy/barcode
  label_source: pdf-page-labels   # folio-vs-label agreement: 99.2%
  label_overrides: {}
  role_overrides:
    - {page: 4, role: title-page}

furniture:
  top_band: 42.9
  repeat_min_pages: 3
  extra:
    - "Bibliography"            # running head on the short bibliography section
  keep: []
  # repeated (top, 63p): 'The Mystics of Isla#'
  # repeated (top, 12p): 'The Gnosis'
  # repeated (top, 10p): '#ntroduction'
  # repeated (top, 9p): 'Saints and Miracles'
  # repeated (top, 8p): 'The Path'
  # repeated (top, 8p): 'The Unitive State'
  # repeated (top, 7p): '#ne Love'
  # repeated (top, 6p): '#hapter #'

styles:                       # JP-P1 — all 28 observed clusters mapped
  body_pstyle: "NewBaskerville-Roman@11"
  pstyle_map:
    "NewBaskerville-Roman@11": {role: p}   # high: dominant text cluster
    "NewBaskerville-Roman@10": {role: p}       # inset quotations / index text
    "NewBaskerville-Roman@9": {role: p}        # footnotes split geometrically; series-page prose
    "NewBaskerville-Italic@11/center": {role: p} # running heads, furniture-stripped
    "NewBaskerville-Italic@11": {role: p}      # inline emphasis
    "NewBaskerville-Roman@8": {role: p}        # copyright/LCCN text
    "NewBaskerville-Italic@9": {role: p}       # italic runs in footnotes
    "NewBaskerville-Italic@10": {role: p}      # inset verse emphasis
    "NewBaskerville-Bold@13/center": {role: h2} # body section headings
    "NewBaskerville-Bold@13": {role: h2}       # mixed-style section headings
    "NewBaskerville-BoldItali@13/center": {role: h1} # chapter-number kicker; joined to the title below
    "NewBaskerville-Roman@18/center": {role: h1} # preface/chapter/back-matter heads
    "Present-Black@14/center": {role: p}        # series-page display
    "WoodtypeOrnaments-Two@24/center": {role: drop} # series-page ornament
    # title page (p4)
    "Benguiat-Book@28": {role: title-page}
    "Benguiat-Book@16/center": {role: title-page}
    "Benguiat-Book@12/center": {role: title-page}
    # cover and excluded back-cover type
    "Benguiat-Normal@18": {role: drop}
    "Benguiat-Normal@30": {role: drop}
    "Benguiat-Normal@58": {role: drop}
    "Benguiat-Medium@7": {role: drop}
    "Benguiat-Medium@9": {role: drop}
    "Benguiat-Medium@10": {role: drop}
    "Benguiat-Medium@10/center": {role: drop}
    "Benguiat-Normal@10": {role: drop}
    "OCRB@8": {role: drop}
    "OCRB@9": {role: drop}
    "Present@15": {role: drop}
