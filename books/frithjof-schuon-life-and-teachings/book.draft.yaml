# pdf2epub book.yaml — DRAFT written by init; every judgment below is a
# proposal traced to analysis/structure_report.md. FILL-ME-IN markers fail
# the build until the agent decides them (by LOOKING at analysis/pages/).

schema_version: 1

source:
  folder: "package"
  pdf: "Frithjof Schuon Life and Teachings.pdf"
  sha256: "c0eb9f273586511043238f1a4abab597ee79a2a3e13aa799c900c2a8c2717fc0"

metadata:                     # JP-P5 — read title/copyright page renders
  title: FILL-ME-IN
  creators: []                # [{name: ..., role: aut|trl|edt|...}]
  publisher: ""               # from the copyright page; no default
  language: en
  additional_languages: []
  isbn_epub:                  # never invented; empty -> identifier/urn:uuid
  isbn_print:
  identifier: cf849a73-d17f-4cc5-875a-4234c9d5a0b3   # persistent EPUB id; keep STABLE across revisions
  released:                   # YYYY-MM-DD of this EPUB revision (dcterms:modified)
  date:
  cover: assets/cover.jpg     # produced by cover_render at build time
  cover_render: {page: 1, box: trim, dpi: 300}
  # cover evidence: page 1 is image-dominated (2 image(s), 119 chars)

pages:                        # JP-P2 — confirm against thumbs
  cover: [1]
  front: {first: 2, last: 15}   # roman folios
  body:  {first: 16, last: 211}   # printed folio '1' seen on p.16
  exclude: []
  label_source: pdf-page-labels   # folio-vs-label agreement: 100.0%
  label_overrides: {}
  role_overrides: []          # e.g. {page: 3, role: title-page}

furniture:
  top_band: 46.6
  repeat_min_pages: 3
  extra: []
  keep: []
  # repeated (top, 88p): '#Frithjof Schuon'
  # repeated (top, 23p): 'A Biographical Approach#'
  # repeated (top, 22p): 'Notes to Chapter #'
  # repeated (top, 13p): 'Esoterism and Tradition#'
  # repeated (top, 11p): 'A Spiritual Portrait#'
  # repeated (top, 9p): '#etaphysical and Spiritual Aesthetics#'
  # repeated (top, 3p): 'FRITHJOF SCHUON'

styles:                       # JP-P1 — review every non-high confidence row
  body_pstyle: "Goudy@10"
  pstyle_map:
    "Goudy@10": {role: p}   # high: dominant text cluster
    "Goudy-Italic@10": {role: p}   # low: body-like
    "Goudy@9": {role: p}   # low: smaller than body (9.0pt)
    "Goudy@10/center": {role: h3}   # low: centered, body-sized
    "Goudy-Italic@10/center": {role: h3}   # low: centered, body-sized
    "Goudy@16/center": {role: h1}   # medium: size 16.0pt >= 1.35x body
    "Goudy@12/center": {role: h2}   # medium: 12.0pt centered
    "Goudy-Italic@12/center": {role: h2}   # medium: 12.0pt centered
    "Goudy-Bold@9": {role: p}   # low: smaller than body (9.0pt)
    "ZapfDingbats@10/center": {role: h3}   # low: centered, body-sized
  charstyles: {}              # font-level flags, e.g. Bembo-SC: {smallcaps: true}
  unmapped_role: p
  fail_on_unmapped: false     # set true once the map is reviewed

flow:
  indent_threshold: 15.0
  gap_factor: 1.6             # median leading measured: 12.0pt
  dehyphenate: lower-only
  restore_spaces: false       # lost-space hits: 1
  join_center_lines: true
  reattach_dropcaps: true
  overrides: []               # {page, line(RAW extract idx), action, note}

footnotes:                    # JP-P4
  policy: none   # regions on 0 pages; census {'digit': 399}
  marker: digits

toc:                          # JP-P3 — three witnesses, see report
  source: outline   # outline=48 printed=13 links=0
  printed_pages: [8]
  handling: rebuild
  strip_page_numbers: true
  nav_depth: 2

glyphs:                       # JP-P6 — verify EACH on its render, then set action
  pua_map: {}
  fail_on_unmapped_pua: true

fonts:                        # JP-P7 — OFL only, from system files, never from the PDF
  embed: []
  subset: true

languages: {cjk_han_only: zh, overrides: []}   # JP-P8

split: {at_roles: [h1], warn_over_files: 90}

images:                       # JP-P4b
  raster_dpi: 300
  max_pixels: 1600
  figure_pages: []

output: {slug: frithjof-schuon-life-and-teachings, include_ncx: true}
